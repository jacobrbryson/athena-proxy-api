steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: Build
    args:
      - "build"
      - "-t"
      - "$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/athena-proxy-api:$COMMIT_SHA"
      - "."

  # 2. Push the Docker image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: Push
    args:
      - "push"
      - "$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/athena-proxy-api:$COMMIT_SHA"

  # 3. Deploy the container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: Deploy
    args:
      - "gcloud"
      - "run"
      - "deploy"
      - "athena-proxy-api"
      - "--image"
      - "$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/athena-proxy-api:$COMMIT_SHA"
      - "--region"
      - "$_REGION"
      - "--platform"
      - "managed"
      # Public entry point — this one IS internet-facing.
      - "--allow-unauthenticated"

      # --- Secrets: pulled from Secret Manager at deploy time, never baked into the image ---
      - "--update-secrets=JWT_SECRET=JWT_SECRET:latest"

      # --- Non-secret runtime config (custom ^@^ delimiter so values can contain commas) ---
      - "--set-env-vars=^@^GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID@API_TARGET=$_API_TARGET@API_AUDIENCE=$_API_AUDIENCE@CORS_ALLOWED_ORIGINS=$_CORS_ALLOWED_ORIGINS"

# The final image tag is saved in the Artifact Registry
images:
  - "$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/athena-proxy-api:$COMMIT_SHA"

# Substitute variables.
# Secrets are NOT here — they live in Secret Manager (see SECURITY_SETUP.md).
substitutions:
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _REGION: us-central1
  _GOOGLE_CLIENT_ID: "12367074465-eg00iem3k5nfsnh7v13j2rltql3c7nqg.apps.googleusercontent.com"
  # The PRIVATE core_api URL this proxy forwards to (set both to the core_api Cloud Run URL).
  _API_TARGET: "https://athena-core-api-12367074465.us-central1.run.app"
  _API_AUDIENCE: "https://athena-core-api-12367074465.us-central1.run.app"
  _CORS_ALLOWED_ORIGINS: "https://athena-guardians-mlkumvppsa-uc.a.run.app"
options:
  logging: CLOUD_LOGGING_ONLY
